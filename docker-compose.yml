services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecoti}
      POSTGRES_USER: ${POSTGRES_USER:-ecoti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecoti}
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecoti}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-ecotineo4j}
      NEO4J_PLUGINS: '["apoc"]'
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4jdata:/data"]

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes: ["ollamadata:/root/.ollama"]
    profiles: ["ollama"]   # opt-in: `docker compose --profile ollama up`

  api:
    build: ./api
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_demo &&
             daphne -b 0.0.0.0 -p 8000 ecoti.asgi:application"

  worker:
    build: ./api
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api: { condition: service_started }
      redis: { condition: service_healthy }
    command: celery -A ecoti worker -B -l info

  web:
    build: ./web
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
      NEXT_PUBLIC_WS_BASE: ws://localhost:8000
    ports: ["3000:3000"]
    depends_on:
      api: { condition: service_started }

volumes:
  pgdata:
  neo4jdata:
  ollamadata:
