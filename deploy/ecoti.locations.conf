# EcoTi routes — included inside the default server{} block on port 80.
# Frontend (Next, basePath=/ecoti) -> 127.0.0.1:8090 ; Backend (Django ASGI) -> 127.0.0.1:8091

# Exact /ecoti (no trailing slash) — proxy to Next (basePath serves the page here).
# Proxying (not redirecting) avoids a loop with Next's trailing-slash 308.
location = /ecoti {
    proxy_pass http://127.0.0.1:8090;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /ecoti;
    proxy_read_timeout 120;
    add_header Cache-Control no-store always;
}

# API: /ecoti/api/* -> Django /api/*
location /ecoti/api/ {
    proxy_pass http://127.0.0.1:8091/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300;
    proxy_connect_timeout 10;
    proxy_send_timeout 300;
    add_header Cache-Control no-store always;
}

# WebSocket live feed: /ecoti/ws/* -> Django /ws/*
location /ecoti/ws/ {
    proxy_pass http://127.0.0.1:8091/ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300;
    proxy_connect_timeout 10;
    proxy_send_timeout 300;
}

# Frontend (also serves /ecoti/_next/* assets)
location /ecoti/ {
    proxy_pass http://127.0.0.1:8090;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /ecoti;
    proxy_read_timeout 120;
    proxy_connect_timeout 10;
    proxy_send_timeout 120;
    add_header Cache-Control no-store always;
}
