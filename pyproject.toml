[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [
  "web/node_modules",
  "web/.next",
  "api/**/migrations",
  "api/**/__pycache__",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "S", "UP"]
ignore = [
  "S101",  # Django tests use assert-style checks in future pytest files.
  "S105",  # Demo env/default passwords are documented as insecure placeholders.
  "S106",
  "E501",  # Demo strings/advisories are easier to review unwrapped.
]

[tool.ruff.lint.per-file-ignores]
"api/core/tests.py" = ["S101"]
"api/core/management/commands/seed_demo.py" = ["S106"]
"tools/generate_synthetic_fraud_graph.py" = ["S311"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "ecoti.settings"
python_files = ["tests.py", "test_*.py", "*_tests.py"]
testpaths = ["api"]
pythonpath = ["api"]
addopts = "-q --cov=api --cov-report=term-missing --cov-report=xml:api/coverage.xml"

[tool.bandit]
exclude_dirs = ["web/node_modules", "web/.next", "api/core/migrations"]
skips = ["B101", "B105", "B106"]
